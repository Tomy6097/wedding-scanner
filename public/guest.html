<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Invitation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      background: #1a1a2e;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .container { width: 100%; max-width: 380px; }
    .card {
      background: #fff; border-radius: 16px;
      overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      margin-bottom: 1rem;
    }
    .card-img-wrap { position: relative; width: 100%; }
    .card-img-wrap img.template { width: 100%; display: block; }
    .card-img-wrap canvas { width: 100%; display: block; }
    .plain-qr { padding: 1.5rem; text-align: center; }
    .plain-qr img { width: 200px; height: 200px; border: 1px solid #e5e7eb; border-radius: 8px; }
    .guest-info { padding: 1rem 1.25rem; border-top: 1px solid #f0f0f0; }
    .guest-name { font-size: 1.1rem; font-weight: 700; color: #1a1a2e; }
    .guest-meta { font-size: 0.8rem; color: #888; margin-top: 0.2rem; }
    .status-badge {
      display: inline-block; padding: 0.25rem 0.75rem; border-radius: 999px;
      font-size: 0.75rem; font-weight: 600; margin-top: 0.5rem;
      background: #d1fae5; color: #065f46;
    }
    .status-badge.pending { background: #f3f4f6; color: #6b7280; }
    .actions { padding: 0.75rem 1.25rem 1.25rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
      padding: 0.7rem 1rem; border-radius: 8px; border: none;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      text-decoration: none; transition: opacity 0.15s; width: 100%;
    }
    .btn:hover { opacity: 0.88; }
    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-outline { background: #fff; color: #374151; border: 1px solid #d1d5db; }
    .btn-wa { background: #25D366; color: #fff; }
    .section-title {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: rgba(255,255,255,0.4);
      margin: 1rem 0 0.5rem; text-align: center;
    }
    .loading { color: rgba(255,255,255,0.6); text-align: center; padding: 3rem 1rem; }
    .error-msg { color: #fca5a5; text-align: center; padding: 2rem 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading" class="loading">Loading your invitation...</div>
    <div id="content" style="display:none">

      <!-- QR Check-in Card -->
      <div class="section-title" id="qr-section-title">Check-in QR Code</div>
      <div class="card" id="qr-card">
        <div class="card-img-wrap" id="qr-card-wrap"></div>
        <div class="guest-info">
          <div class="guest-name" id="guest-name-el"></div>
          <div class="guest-meta" id="guest-meta-el"></div>
          <div id="status-badge-el"></div>
        </div>
        <div class="actions">
          <button class="btn btn-primary" onclick="downloadQRCard()">Save QR Card</button>
          <button class="btn btn-wa" onclick="shareWhatsApp('qr')">Share via WhatsApp</button>
        </div>
      </div>

      <!-- Invitation Card (if set) -->
      <div id="invite-section" style="display:none">
        <div class="section-title">Invitation Card</div>
        <div class="card">
          <div class="card-img-wrap" id="invite-card-wrap"></div>
          <div class="actions">
            <button class="btn btn-primary" onclick="downloadCard('invite')">Save Invitation</button>
            <button class="btn btn-wa" onclick="shareWhatsApp('invite')">Share via WhatsApp</button>
            <button class="btn btn-outline" onclick="shareViaSMS('invite')">Share via SMS</button>
          </div>
        </div>
      </div>

      <!-- Thank You Card (if set) -->
      <div id="thanks-section" style="display:none">
        <div class="section-title">Thank You Card</div>
        <div class="card">
          <div class="card-img-wrap" id="thanks-card-wrap"></div>
          <div class="actions">
            <button class="btn btn-primary" onclick="downloadCard('thanks')">Save Thank You Card</button>
            <button class="btn btn-wa" onclick="shareWhatsApp('thanks')">Share via WhatsApp</button>
            <button class="btn btn-outline" onclick="shareViaSMS('thanks')">Share via SMS</button>
          </div>
        </div>
      </div>

    </div>
    <div id="error-div" class="error-msg" style="display:none"></div>
  </div>

  <script>
    const token = window.location.pathname.split('/guest/')[1];
    let _data = null;
    let _canvases = {};

    // Scroll to top
    if (history.scrollRestoration) history.scrollRestoration = 'manual';
    window.scrollTo(0, 0);

    async function load() {
      try {
        const res  = await fetch(`/api/guests/view/${token}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Not found');
        _data = data;
        render(data);
      } catch (e) {
        document.getElementById('loading').style.display = 'none';
        const errDiv = document.getElementById('error-div');
        errDiv.style.display = 'block';
        errDiv.innerHTML = `Invitation not found.<br><small>Please contact the event organizer.</small>`;
      }
    }

    function render(data) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';

      // Guest info
      document.getElementById('guest-name-el').textContent = data.name;
      const meta = [data.table_number ? 'Table: ' + data.table_number : null,
                    data.eventName].filter(Boolean).join(' · ');
      document.getElementById('guest-meta-el').textContent = meta;
      const badge = document.getElementById('status-badge-el');
      badge.innerHTML = data.status === 'used'
        ? '<span class="status-badge">Checked In</span>'
        : '<span class="status-badge pending">Not yet checked in</span>';

      // QR card
      buildQRCard(data);

      // Invitation card
      if (data.inviteTemplate) {
        document.getElementById('invite-section').style.display = 'block';
        buildNameCard('invite', data.inviteTemplate, data.name);
      }

      // Thank you card
      if (data.thanksTemplate) {
        document.getElementById('thanks-section').style.display = 'block';
        buildNameCard('thanks', data.thanksTemplate, data.name);
      }
    }

    function buildQRCard(data) {
      const wrap = document.getElementById('qr-card-wrap');
      if (data.cardTemplate && data.cardTemplate.image && data.cardTemplate.qr_x != null) {
        // Draw card template with QR overlay on canvas
        const canvas = document.createElement('canvas');
        const ctx    = canvas.getContext('2d');
        const cardImg = new Image();
        cardImg.onload = () => {
          canvas.width  = cardImg.naturalWidth;
          canvas.height = cardImg.naturalHeight;
          ctx.drawImage(cardImg, 0, 0);
          const qrImg = new Image();
          qrImg.onload = () => {
            const W    = canvas.width;
            const H    = canvas.height;
            const qrW  = (data.cardTemplate.qr_size / 100) * W;
            const qrX  = (data.cardTemplate.qr_x / 100) * W - qrW / 2;
            const qrY  = (data.cardTemplate.qr_y / 100) * H - qrW / 2;
            ctx.drawImage(qrImg, qrX, qrY, qrW, qrW);
            _canvases['qr'] = canvas;
          };
          qrImg.src = data.qrDataUrl;
        };
        cardImg.src = data.cardTemplate.image;
        wrap.appendChild(canvas);
      } else {
        // Plain QR
        wrap.innerHTML = `<div class="plain-qr"><img src="${data.qrDataUrl}" alt="QR Code" /></div>`;
        _canvases['qr'] = null; // will use img src directly
      }
    }

    function buildNameCard(type, template, guestName) {
      const wrap = document.getElementById(`${type}-card-wrap`);
      const canvas = document.createElement('canvas');
      const ctx    = canvas.getContext('2d');
      const img    = new Image();
      img.onload = () => {
        canvas.width  = img.naturalWidth;
        canvas.height = img.naturalHeight;
        ctx.drawImage(img, 0, 0);
        // Draw guest name
        const fontSize = Math.round((template.name_size / 100) * img.naturalWidth);
        ctx.font      = `bold ${fontSize}px 'Segoe UI', sans-serif`;
        ctx.fillStyle = template.name_color || '#000000';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const x = (template.name_x / 100) * img.naturalWidth;
        const y = (template.name_y / 100) * img.naturalHeight;
        ctx.fillText(guestName, x, y);
        _canvases[type] = canvas;
      };
      img.src = template.image;
      wrap.appendChild(canvas);
    }

    function downloadQRCard() {
      const canvas = _canvases['qr'];
      if (canvas) {
        const a = document.createElement('a');
        a.download = `qr-${_data.name.replace(/\s+/g,'-').toLowerCase()}.png`;
        a.href = canvas.toDataURL('image/png');
        a.click();
      } else {
        // Plain QR — download the QR image directly
        const a = document.createElement('a');
        a.download = `qr-${_data.name.replace(/\s+/g,'-').toLowerCase()}.png`;
        a.href = _data.qrDataUrl;
        a.click();
      }
    }

    function downloadCard(type) {
      const canvas = _canvases[type];
      if (!canvas) return;
      const a = document.createElement('a');
      a.download = `${type}-${_data.name.replace(/\s+/g,'-').toLowerCase()}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
    }

    function shareWhatsApp(type) {
      const lookupCode = (_data.unique_id || '').substring(0, 8).toUpperCase();
      let msg;
      if (type === 'qr') {
        msg = `Dear ${_data.name}, you are invited to ${_data.eventName}!\n\nYour check-in QR code: ${window.location.href}\n\nCode: ${lookupCode}`;
      } else if (type === 'invite') {
        msg = `Dear ${_data.name}, you are cordially invited to ${_data.eventName}!\n\nView your invitation: ${window.location.href}`;
      } else {
        msg = `Dear ${_data.name}, thank you for attending ${_data.eventName}! It was a pleasure having you with us.`;
      }
      window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function shareViaSMS(type) {
      const lookupCode = (_data.unique_id || '').substring(0, 8).toUpperCase();
      let msg;
      if (type === 'invite') {
        msg = `Dear ${_data.name}, you are invited to ${_data.eventName}. View: ${window.location.href}`;
      } else {
        msg = `Dear ${_data.name}, thank you for attending ${_data.eventName}!`;
      }
      const phone = (_data.phone || '').replace(/\D/g, '');
      window.open(`sms:${phone}?body=${encodeURIComponent(msg)}`, '_self');
    }

    load();
  </script>
</body>
</html>
